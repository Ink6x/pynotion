name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx run ruff check .

  test:
    name: Test (pytest, coverage >= 90%)
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Run tests with coverage gate
        run: pytest --cov=pages --cov=config --cov=accounts --cov-fail-under=90
      - name: Deploy check (prod settings)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ${{ github.sha }}-ci-only-dummy-secret-key-0123456789
          DJANGO_ALLOWED_HOSTS: example.com
          DATABASE_URL: sqlite:///ci-check.sqlite3
        run: python manage.py check --deploy --fail-level WARNING

  test-postgres:
    name: Test (PostgreSQL, 全文検索)
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pynotion
          POSTGRES_PASSWORD: pynotion
          POSTGRES_DB: pynotion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pynotion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # dev 設定 + DATABASE_URL で PostgreSQL に切り替える。
      # pg_trgm / SearchVector の検索パス (pages.search._search_postgres) を実検証する。
      DATABASE_URL: postgres://pynotion:pynotion@localhost:5432/pynotion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies (dev + prod = psycopg)
        run: pip install -e ".[dev,prod]"
      - name: Migrate (pg_trgm 拡張 + GIN インデックス作成)
        run: python manage.py migrate
      - name: Run tests on PostgreSQL
        run: pytest -q

  docker:
    name: Docker build
    needs: [test, test-postgres]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dockerfile は Phase 1-I 後半 (feat/docker-prod) で追加される。
      # それまでは存在チェックでスキップし、追加後は自動で有効になる。
      - name: Build image
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: docker build -t pynotion:ci .
      - name: Skip (Dockerfile not yet added)
        if: ${{ hashFiles('Dockerfile') == '' }}
        run: echo "Dockerfile が未追加のためスキップ (feat/docker-prod で有効化)"
