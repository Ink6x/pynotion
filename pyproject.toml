[project]
name = "pynotion"
version = "0.1.0"
description = "Notion クローン — Python (Django) による車輪の再発明"
requires-python = ">=3.11"
dependencies = [
    "django>=5.2,<6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]
testpaths = ["pages/tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
